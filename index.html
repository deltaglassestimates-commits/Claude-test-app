<!DOCTYPE html>
<html>
<head>
  <title>Claude Test App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f4f4f4;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: #1f6feb;
      color: white;
      border: none;
      cursor: pointer;
    }
    h1 {
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Glass Partition Calculator</h1>
  <label>Width (ft)</label>
  <input type="number" id="width">

  <label>Height (ft)</label>
  <input type="number" id="height">

  <button onclick="calculate()">Calculate</button>

  <h2 id="result"></h2>
</div>

<script>
  function calculate() {
    let width = document.getElementById('width').value;
    let height = document.getElementById('height').value;

    let total = width * height * 50; // $50 per sqft

    document.getElementById('result').innerText =
      "Estimated Cost: $" + total.toFixed(2);
  }
</script>

</body>
</html>
